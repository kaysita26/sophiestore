<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.controles{
  padding:10px;
  text-align:center;
}

input, select{
  padding:8px;
  margin:5px;
  width:200px;
  max-width:90%;
}

#productos{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.producto{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.producto img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

button{
  padding:12px 20px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  margin:15px;
}

#total{
  text-align:center;
  font-size:20px;
  margin:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>SOPHIE STORE</header>

<div class="controles">
  <input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="filtrar()">
  <select id="filtroMarca" onchange="filtrar()">
    <option value="">Todas las marcas</option>
  </select>
</div>

<div id="productos"></div>

<div id="total">Total: S/. 0.00</div>

<center>
<button onclick="enviarPedido()">Enviar por WhatsApp</button>
</center>

<script>

let urlCSV = "TU_LINK_CSV_AQUI"; // PEGA TU LINK CSV AQUÍ

let productos = [];
let carrito = [];

fetch(urlCSV)
.then(res => res.text())
.then(data => {

  let filas = data.split("\n").slice(1);
  let marcas = [];

  filas.forEach((fila,index) => {

    let columnas = fila.split(",");

    if(columnas.length >= 6){

      let producto = {
        nombre: columnas[0],
        marca: columnas[1],
        precioUnidad: parseFloat(columnas[2]),
        precioMayor: parseFloat(columnas[3]),
        minMayor: parseInt(columnas[4]),
        imagen: columnas[5]
      };

      productos.push(producto);

      if(!marcas.includes(producto.marca)){
        marcas.push(producto.marca);
        document.getElementById("filtroMarca").innerHTML += 
        `<option value="${producto.marca}">${producto.marca}</option>`;
      }

      document.getElementById("productos").innerHTML += `
        <div class="producto" data-nombre="${producto.nombre.toLowerCase()}" data-marca="${producto.marca}">
          <img src="${producto.imagen}">
          <h4>${producto.nombre}</h4>
          <p>Marca: ${producto.marca}</p>
          <p>Unidad: S/. ${producto.precioUnidad.toFixed(2)}</p>
          <p>Mayor desde ${producto.minMayor}: S/. ${producto.precioMayor.toFixed(2)}</p>
          <input type="number" min="0" value="0" onchange="calcular(${index},this.value)">
        </div>
      `;
    }
  });

})
.catch(() => {
  alert("Error cargando productos. Verifica tu CSV.");
});

function filtrar(){
  let texto = document.getElementById("buscador").value.toLowerCase();
  let marca = document.getElementById("filtroMarca").value;
  let productosDiv = document.querySelectorAll(".producto");

  productosDiv.forEach(p=>{
    let nombre = p.dataset.nombre;
    let marcaProd = p.dataset.marca;

    let coincideNombre = nombre.includes(texto);
    let coincideMarca = marca=="" || marcaProd==marca;

    p.style.display = (coincideNombre && coincideMarca) ? "block" : "none";
  });
}

function calcular(index,cantidad){

  cantidad = parseInt(cantidad);
  if(!cantidad) cantidad = 0;

  let producto = productos[index];

  let precio = cantidad >= producto.minMayor 
               ? producto.precioMayor 
               : producto.precioUnidad;

  let subtotal = cantidad * precio;

  carrito[index] = {
    nombre: producto.nombre,
    cantidad: cantidad,
    subtotal: subtotal
  };

  actualizarTotal();
}

function actualizarTotal(){

  let total = 0;

  carrito.forEach(p=>{
    if(p) total += p.subtotal;
  });

  document.getElementById("total").innerHTML =
  "Total: S/. " + total.toFixed(2);
}

function enviarPedido(){

  let mensaje = "Hola, quiero pedir:%0A";

  carrito.forEach(p=>{
    if(p && p.cantidad > 0){
      mensaje += `- ${p.nombre} x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
    }
  });

  let totalFinal = document.getElementById("total").innerText.replace("Total: S/. ","");

  mensaje += `%0ATotal: S/. ${parseFloat(totalFinal).toFixed(2)}`;

  window.open("https://wa.me/51992044102?text=" + mensaje);
}

</script>

</body>
</html>
