<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sophie Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* HEADER */
header{
background:#6a0dad;
color:white;
padding:10px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:20px;
font-weight:bold;
}

header img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

/* FILTROS */
.filtros{
background:white;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

input,select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* PRODUCTOS GRID */
#productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.producto{
background:white;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
display:flex;
flex-direction:column;
}

.producto img{
width:100%;
height:180px;
object-fit:contain;
background:#fff;
}

.info{
padding:10px;
}

.info h3{
margin:5px 0;
font-size:16px;
}

.categoria{
font-size:12px;
color:gray;
}

.precio{
font-weight:bold;
margin-top:5px;
}

input[type=number]{
width:70px;
margin-top:5px;
}

/* CELULAR: imagen izquierda */
@media(max-width:600px){

.producto{
flex-direction:row;
height:140px;
}

.producto img{
width:40%;
height:100%;
object-fit:contain;
}

.info{
width:60%;
font-size:13px;
}

}

/* CARRITO APP */
.carrito{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
box-shadow:0 -5px 15px rgba(0,0,0,0.2);
padding:15px;
text-align:center;
}

.total{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
background:#25D366;
color:white;
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:10px;
}

.btn:disabled{
background:gray;
cursor:not-allowed;
}

.btn img{
width:22px;
}

.form{
margin-bottom:10px;
}

.form input{
margin:5px;
}

.espacio{
height:200px;
}

</style>
</head>
<body>

<header>
<img src="https://github.com/kaysita26/tienda/raw/main/imagenes/LOGO%20SOPHIE%20STORE.jpeg">
Sophie Store
</header>

<div class="filtros">
<input type="text" id="buscar" placeholder="Buscar..." onkeyup="filtrar()">
<select id="categoria" onchange="filtrar()">
<option value="">Todas las categorías</option>
</select>
</div>

<div id="productos"></div>

<div class="espacio"></div>

<div class="carrito">

<div class="form">
<input type="text" id="nombreCliente" placeholder="Tu nombre">
<input type="tel" id="celCliente" placeholder="Tu celular">
</div>

<div class="total">
Total: S/. <span id="total">0.00</span>
</div>

<button class="btn" id="btnEnviar" onclick="confirmarPedido()" disabled>
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
Confirmar Pedido
</button>

</div>

<script>

let urlCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8uMFvOEq09EXVbg6YxPa1lhGndcrwD-ELRkxRQVsiG4Tjb646vPzGPcuHP4CD_EZ-F7da5BonXwt3/pub?gid=1913233787&single=true&output=csv";

let productos=[];
let carrito=[];

fetch(urlCSV)
.then(res=>res.text())
.then(data=>{

let filas=data.split("\n").slice(1);

filas.forEach((fila,index)=>{

let col=fila.split(",");

if(col.length>=7){

let producto={
nombre:col[0],
marca:col[1],
precioUnidad:parseFloat(col[2]),
precioMayor:parseFloat(col[3]),
minMayor:parseInt(col[4]),
imagen:col[5],
categoria:col[6]
};

productos.push(producto);

if(!document.getElementById("categoria").innerHTML.includes(producto.categoria)){
document.getElementById("categoria").innerHTML+=
`<option value="${producto.categoria}">${producto.categoria}</option>`;
}

document.getElementById("productos").innerHTML+=`
<div class="producto" data-nombre="${producto.nombre.toLowerCase()}" data-cat="${producto.categoria}">
<img src="${producto.imagen}">
<div class="info">
<h3>${producto.nombre}</h3>
<div class="categoria">${producto.categoria}</div>
<div class="precio">Unidad: S/. ${producto.precioUnidad.toFixed(2)}</div>
<div>Mayor desde ${producto.minMayor}: S/. ${producto.precioMayor.toFixed(2)}</div>
<input type="number" min="0" value="0" oninput="calcular(${index},this.value)">
</div>
</div>`;
}

});

});

function calcular(index,cantidad){

cantidad=parseInt(cantidad);

if(isNaN(cantidad) || cantidad<=0){
carrito[index]=null;
actualizarTotal();
return;
}

let p=productos[index];

let precio=cantidad>=p.minMayor?p.precioMayor:p.precioUnidad;

let subtotal=cantidad*precio;

carrito[index]={
nombre:p.nombre,
cantidad:cantidad,
subtotal:subtotal
};

actualizarTotal();

}

function actualizarTotal(){

let total=0;
let items=0;

carrito.forEach(p=>{
if(p){
total+=p.subtotal;
items++;
}
});

document.getElementById("total").innerText=total.toFixed(2);

document.getElementById("btnEnviar").disabled= items===0;

}

function confirmarPedido(){

let nombre=document.getElementById("nombreCliente").value.trim();
let cel=document.getElementById("celCliente").value.trim();

if(nombre==="" || cel===""){
alert("Debes ingresar tu nombre y celular");
return;
}

if(!confirm("¿Confirmas que tu pedido está correcto?")){
return;
}

let mensaje="Hola, soy "+nombre+"%0A";
mensaje+="Mi número es: "+cel+"%0A%0A";
mensaje+="Quiero pedir:%0A";

let total=0;

carrito.forEach(p=>{
if(p){
mensaje+=`- ${p.nombre} x${p.cantidad} = S/. ${p.subtotal.toFixed(2)}%0A`;
total+=p.subtotal;
}
});

mensaje+="%0ATotal: S/. "+total.toFixed(2);

window.open("https://wa.me/51992044102?text="+mensaje);

location.reload();

}

function filtrar(){

let texto=document.getElementById("buscar").value.toLowerCase();
let categoria=document.getElementById("categoria").value;

let cards=document.querySelectorAll(".producto");

cards.forEach(card=>{
let nombre=card.getAttribute("data-nombre");
let cat=card.getAttribute("data-cat");

let mostrar=true;

if(texto && !nombre.includes(texto)){ mostrar=false; }
if(categoria && cat!=categoria){ mostrar=false; }

card.style.display=mostrar?"block":"none";
});

}

</script>

</body>
</html>
